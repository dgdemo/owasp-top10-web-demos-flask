# Name of this GitHub Actions workflow.
name: Security CI

on:
  # Scan changed files in PRs (diff-aware scanning):
  pull_request: {}
  # Scan on-demand through GitHub Actions interface:
  workflow_dispatch: {}
  # Scan mainline branches and report all findings:
  push:
    branches: ["master", "main"]

jobs:
  semgrep_scan:
    # User definable name of this GitHub Actions job.
    name: semgrep/ci
    # If you are self-hosting, change the following `runs-on` value:
    runs-on: ubuntu-latest
    # Skip any PR created by dependabot to avoid permission issues:
    if: (github.actor != 'dependabot[bot]')
    permissions:
      # required for all workflows
      security-events: write
      # only required for workflows in private repositories
      actions: read
      contents: read

    steps:
      # Fetch project source with GitHub Actions Checkout.
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep Scans
        run: |
          semgrep --error --config detect/semgrep/sql-injection.yml .
          semgrep --error --config detect/semgrep/xss-rules.yml .

  pip_audit_scan:
    name: pip-audit/ci
    runs-on: ubuntu-latest
    if: (github.actor != 'dependabot[bot]')
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit and project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt

      - name: Run pip-audit Scan
        run: |
          pip-audit -r requirements.txt
  gitleaks_scan:
    name: git-secrets/ci
    runs-on: ubuntu-latest
    if: (github.actor != 'dependabot[bot]')
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install git-secrets
        run: |
          sudo apt-get update
          sudo apt-get install -y git-secrets

      - name: Run git-secrets Scan
        run: |
          git secrets --scan -r .
  dast-zap:
    name: OWASP_ZAP/ci
    runs-on: ubuntu-latest
    if: (github.actor != 'dependabot[bot]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./sql-flask
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask app
        working-directory: ./sql-flask
        run: |
          nohup python app.py > flask.log 2>&1 &
          sleep 5
          cat flask.log

      - name: Verify Flask app is running
        run: |
          curl -I http://127.0.0.1:5000
          curl http://127.0.0.1:5000 | head

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --user root --network=host \
            -v "${{ github.workspace }}:/zap/wrk/:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://127.0.0.1:5000 \
            -r zap-report.html \
            -I

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-report.html
          retention-days: 7

      - name: Upload Flask log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flask-runtime-log
          path: sql-flask/flask.log
          retention-days: 7
